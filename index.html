<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    
<script async src="https://securepubads.g.doubleclick.net/tag/js/gpt.js"></script>
<script>
window.googletag = window.googletag || { cmd: [] };
googletag.cmd.push(function () {
  var NETWORK = '/63317524/Futbin/';

  var SIZES = {
    halfpage: [[300, 600], [120, 600], [160, 600], [300, 250]],
    footer:   [[728, 90], [970, 90]],
    mpu:      [[300, 250], [336, 280]],
    banner:   [[320, 50], [320, 100], [300, 50], [300, 100]],
    pixel:    [[1, 1]]
  };

  function dskMap(sizes) {
    return googletag.sizeMapping().addSize([1024, 0], sizes).addSize([0, 0], []).build();
  }
  function mobMap(sizes) {
    return googletag.sizeMapping().addSize([768, 0], []).addSize([0, 0], sizes).build();
  }

  var MAP = {
    dskHalfpage: dskMap(SIZES.halfpage),
    dskFooter:   dskMap(SIZES.footer),
    dskMpu:      dskMap(SIZES.mpu),
    dskPixel:    dskMap(SIZES.pixel),
    mobBanner:   mobMap(SIZES.banner),
    mobMpu:      mobMap(SIZES.mpu),
    mobPixel:    mobMap(SIZES.pixel)
  };

  var SLOTS = [
    { unit: 'futbin_dsk_halfpage_left',        div: 'futbin_dsk_halfpage_left',        sizes: SIZES.halfpage, map: MAP.dskHalfpage },
    { unit: 'futbin_dsk_halfpage_right',       div: 'futbin_dsk_halfpage_right',       sizes: SIZES.halfpage, map: MAP.dskHalfpage },
    { unit: 'futbin_dsk_footer',               div: 'futbin_dsk_footer',               sizes: SIZES.footer,   map: MAP.dskFooter, pos: 'footer' },
    { unit: 'futbin_dsk_mpu',                  div: 'futbin_dsk_mpu',                  sizes: SIZES.mpu,      map: MAP.dskMpu },
    { unit: 'futbin_dsk_1x1',                  div: 'futbin_dsk_1x1',                  sizes: SIZES.pixel,    map: MAP.dskPixel },
    { unit: 'futbin_mob_top_banner',           div: 'futbin_mob_top_banner',           sizes: SIZES.banner,   map: MAP.mobBanner, pos: 'top' },
    { unit: 'futbin_mob_sticky_bottom_banner', div: 'futbin_mob_sticky_bottom_banner', sizes: SIZES.banner,   map: MAP.mobBanner, pos: 'sticky' },
    { unit: 'futbin_mob_mpu',                  div: 'futbin_mob_mpu_1',                sizes: SIZES.mpu,      map: MAP.mobMpu,    pos: '1' },
    { unit: 'futbin_mob_mpu',                  div: 'futbin_mob_mpu_2',                sizes: SIZES.mpu,      map: MAP.mobMpu,    pos: '2' },
    { unit: 'futbin_mob_mpu',                  div: 'futbin_mob_mpu_3',                sizes: SIZES.mpu,      map: MAP.mobMpu,    pos: '3' },
    { unit: 'futbin_mob_1x1',                  div: 'futbin_mob_1x1',                  sizes: SIZES.pixel,    map: MAP.mobPixel }
  ];

  var present = [];
  SLOTS.forEach(function (cfg) {
    if (!document.getElementById(cfg.div)) return;

    var slot = googletag.defineSlot(NETWORK + cfg.unit, cfg.sizes, cfg.div)
      .defineSizeMapping(cfg.map)
      .addService(googletag.pubads());

    if (cfg.pos) slot.setTargeting('pos', cfg.pos);

    present.push(cfg.div);
  });

  googletag.pubads().collapseEmptyDivs();
  googletag.pubads().enableSingleRequest();
  googletag.enableServices();

  present.forEach(function (div) { googletag.display(div); });
});
</script>
</head>
<body>
   <h2>16JUL2026</h2>
    <div id='futbin_dsk_mpu' style='min-width: 160px; min-height: 250px;'>
    <script>
      googletag.cmd.push(function() { googletag.display('futbin_dsk_mpu'); });
    </script>
    futbin_dsk_mpu
    </div>
    <div id='futbin_dsk_halfpage_left' style='min-width: 300px; min-height: 600px;'>
      <script>
      googletag.cmd.push(function() { googletag.display('futbin_dsk_halfpage_left'); });
      </script>
      futbin_dsk_halfpage_left
      </div>
<div id="futbin_dsk_halfpage_right">half page right </div>
<div id="futbin_dsk_footer">footer</div>
<div id="futbin_dsk_1x1">dsk_1x1</div>
<div id="futbin_mob_top_banner">top_banner</div>
<div id="futbin_mob_sticky_bottom_banner">sticky_bottom_banner</div>
<div id="futbin_mob_mpu_1">mob_mpu_1</div>
<div id="futbin_mob_mpu_2">mob_mpu_2</div>
<div id="futbin_mob_mpu_3">mob_mpu_3</div>
<div id="futbin_mob_1x1">mob_1x1</div>
</body>
</html>
